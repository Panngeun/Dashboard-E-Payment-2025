<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>E-Payment Dashboard 2025 – Lao PDR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
#app{max-width:1600px;margin:0 auto;padding:18px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:15px 22px;
  background:linear-gradient(135deg,#1e2535,#252b3b);border-radius:14px;border:1px solid rgba(255,255,255,.06)}
.header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:.76rem;color:#64748b;margin-top:2px}
.hbadge{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);
  color:#60a5fa;padding:4px 13px;border-radius:20px;font-size:.72rem;font-weight:600}

.ctrl{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px;align-items:center}
.bgrp{display:flex;background:#1a2033;border-radius:9px;padding:3px;gap:3px}
.btn{padding:6px 16px;border:none;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:600;
  transition:all .18s;color:#94a3b8;background:transparent}
.btn.active-blue{background:#3b82f6;color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.4)}
.btn.active-purple{background:#8b5cf6;color:#fff;box-shadow:0 2px 10px rgba(139,92,246,.4)}
.btn.active-amber{background:#f59e0b;color:#000;box-shadow:0 2px 10px rgba(245,158,11,.4)}
.btn:hover:not(.active-blue):not(.active-purple):not(.active-amber){color:#e2e8f0;background:rgba(255,255,255,.06)}

.mfilt{display:flex;gap:5px;flex-wrap:wrap}
.mpill{padding:5px 10px;border-radius:18px;cursor:pointer;font-size:.73rem;font-weight:700;
  border:1px solid rgba(255,255,255,.1);background:transparent;color:#64748b;transition:all .18s;user-select:none}
.mpill:hover{border-color:rgba(255,255,255,.22);color:#94a3b8}
.mpill.sel-a{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,.5)}
.mpill.sel-b{background:#f59e0b;color:#000;border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.5)}

.hint{font-size:.7rem;color:#475569;padding:5px 11px;background:#1a2033;border-radius:8px;
  border:1px solid rgba(255,255,255,.05);white-space:nowrap}

.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:11px;margin-bottom:16px}
.kcard{background:#1e2535;border-radius:13px;padding:14px;border:1px solid rgba(255,255,255,.06);
  transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;inset:0;border-radius:13px;
  background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);pointer-events:none}
.kcard:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(0,0,0,.4);border-color:rgba(255,255,255,.11)}
.kcard.tot{grid-column:1/-1;background:linear-gradient(135deg,#1e3a5f,#1e2535);border-color:rgba(59,130,246,.2)}
.kicon{font-size:1.45rem;margin-bottom:6px}
.kflags{font-size:1.1rem;margin-bottom:5px;letter-spacing:-2px}
.kname{font-size:.68rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kval{font-size:1.3rem;font-weight:800;color:#e2e8f0;line-height:1.1}
.kcard.tot .kval{font-size:1.85rem;color:#60a5fa}
.cmp-row{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.cmp-blk{flex:1;min-width:75px;background:rgba(0,0,0,.2);border-radius:7px;padding:6px 8px}
.cmp-m{font-size:.62rem;font-weight:700;margin-bottom:2px}
.cmp-v{font-size:.9rem;font-weight:800}
.ca{color:#60a5fa}.cb{color:#fbbf24}
.dbadge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:18px;
  font-size:.7rem;font-weight:700;margin-top:6px}
.dup{background:rgba(16,185,129,.15);color:#10b981}
.ddn{background:rgba(239,68,68,.15);color:#ef4444}
.dneu{background:rgba(148,163,184,.1);color:#64748b}

.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:13px;margin-bottom:16px}
.cc{background:#1e2535;border-radius:13px;padding:16px;border:1px solid rgba(255,255,255,.06)}
.ctitle{font-size:.75rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

.slabel{font-size:.68rem;font-weight:700;color:#475569;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px;padding-left:2px}
.io-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:11px;margin-bottom:16px}
.iocard{background:#1e2535;border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.06);transition:all .2s}
.iocard:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.3)}
.iohdr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ioflags{font-size:1.1rem;letter-spacing:-2px}
.ioname{font-size:.74rem;font-weight:700;color:#e2e8f0}
.iorow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.iorow:last-child{border-bottom:none}
.iolabel{font-size:.66rem;color:#64748b;font-weight:600}
.ionum{font-size:.78rem;font-weight:700}
.cblue{color:#60a5fa}.cgreen{color:#10b981}.camber{color:#f59e0b}

.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.dcard{background:#1e2535;border-radius:11px;padding:12px;border:1px solid rgba(255,255,255,.06);transition:all .2s}
.dcard:hover{transform:translateY(-2px)}
.dbrand{font-size:.74rem;font-weight:800;margin-bottom:5px}
.dval{font-size:1rem;font-weight:700;color:#e2e8f0}
.dsub{font-size:.66rem;color:#64748b;margin-top:2px}

/* ── IO MoM chart section ── */
.io-mom-section{margin-top:20px}
.corr-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cpill{padding:5px 13px;border-radius:18px;cursor:pointer;font-size:.74rem;font-weight:700;
  border:1px solid rgba(255,255,255,.1);background:transparent;color:#64748b;transition:all .18s}
.cpill.active{background:#10b981;color:#fff;border-color:#10b981;box-shadow:0 0 10px rgba(16,185,129,.3)}
.cpill:hover:not(.active){background:rgba(16,185,129,.1);color:#10b981;border-color:rgba(16,185,129,.3)}
.io-mom-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:12px}
.iomcard{background:#1e2535;border-radius:10px;padding:11px;border:1px solid rgba(255,255,255,.06);text-align:center}
.iomcard:hover{border-color:rgba(255,255,255,.12)}
.iomm{font-size:.7rem;font-weight:700;color:#94a3b8;margin-bottom:5px}
.iom-in{font-size:.82rem;font-weight:700;color:#10b981}
.iom-out{font-size:.82rem;font-weight:700;color:#f59e0b}
.iom-net{font-size:.72rem;font-weight:600;margin-top:3px}
.net-pos{color:#a78bfa}.net-neg{color:#ef4444}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2d3748;border-radius:3px}
</style>
</head>
<body>
<div id="app">

<div class="header">
  <div><h1>🇱🇦 E-Payment Dashboard</h1>
    <p>Lao PDR Electronic Payment System &nbsp;•&nbsp; Fiscal Year 2025</p></div>
  <div class="hbadge">Year 2025</div>
</div>

<!-- Controls row 1: tabs + metric + mode -->
<div class="ctrl">
  <div class="bgrp">
    <button class="btn active-blue" id="tab-domestic"    onclick="setTab('domestic')">🏦 Domestic</button>
    <button class="btn"             id="tab-crossborder" onclick="setTab('crossborder')">✈️ Cross-Border</button>
  </div>
  <div class="bgrp">
    <button class="btn active-purple" id="metric-vol"   onclick="setMetric('vol')">📊 Transaction Count</button>
    <button class="btn"               id="metric-value" onclick="setMetric('value')">💰 Value (LAK)</button>
  </div>
  <div class="bgrp">
    <button class="btn"             id="mode-single"  onclick="setMode('single')">Single Month</button>
    <button class="btn active-amber" id="mode-compare" onclick="setMode('compare')">⚡ Compare</button>
  </div>
  <div class="hint"><span id="hint-text">Click 2 months · <span style="color:#60a5fa">Blue</span>=A &nbsp;<span style="color:#fbbf24">Gold</span>=B</span></div>
</div>

<!-- Controls row 2: month pills -->
<div class="ctrl" style="margin-bottom:16px">
  <div class="mfilt" id="month-filter"></div>
</div>

<div id="kgrid" class="kgrid"></div>

<div class="charts-row">
  <div class="cc">
    <div class="ctitle" id="main-chart-title">Monthly Trend</div>
    <div style="position:relative;height:290px"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="cc">
    <div class="ctitle" id="donut-title">Breakdown</div>
    <div style="position:relative;height:290px"><canvas id="donutChart"></canvas></div>
  </div>
</div>

<!-- Cross-border section -->
<div id="cb-extra" style="display:none">
  <div class="slabel">Inbound / Outbound Summary</div>
  <div id="io-grid" class="io-grid"></div>
  <div class="slabel" style="margin-top:14px">Direct Inbound (Alipay · WeChat · GLN)</div>
  <div id="direct-grid" class="dg"></div>

  <!-- ─── NEW: Inbound vs Outbound MoM ─── -->
  <div class="io-mom-section">
    <div class="slabel" style="margin-top:18px">📈 Inbound vs Outbound — Month by Month</div>
    <!-- Corridor selector -->
    <div class="corr-pills" id="corr-pills">
      <button class="cpill active" id="cp-all" onclick="setCorridor('all')">🌐 All Corridors</button>
      <button class="cpill" id="cp-0" onclick="setCorridor(0)">🇱🇦🇹🇭 Thailand</button>
      <button class="cpill" id="cp-1" onclick="setCorridor(1)">🇱🇦🇻🇳 Vietnam</button>
      <button class="cpill" id="cp-2" onclick="setCorridor(2)">🇱🇦🇨🇳 China</button>
      <button class="cpill" id="cp-3" onclick="setCorridor(3)">🇱🇦🇰🇭 Cambodia</button>
    </div>
    <!-- Mini stat cards (one per month) -->
    <div id="io-mom-cards" class="io-mom-cards"></div>
    <!-- Big chart -->
    <div class="cc">
      <div style="position:relative;height:320px"><canvas id="ioChart"></canvas></div>
    </div>
  </div>
</div>

</div><!-- /app -->

/* ── State ── */
let tab='domestic', metric='vol', mode='compare';
let selA=0, selB=11;
let corridor='all';
let mainChart=null, donutChart=null, ioChart=null;

/* ── Helpers ── */
function sum(arr){return (arr||[]).reduce((a,v)=>a+(v||0),0);}
function getVal(arr,m){if(m==='all')return sum(arr);return(arr&&arr[m]!=null)?arr[m]:0;}

function fmt(n,isVal){
  if(n===null||n===undefined||isNaN(n))return'–';
  const a=Math.abs(n);
  if(isVal){
    if(a>=1e12)return(n/1e12).toFixed(2)+' T';
    if(a>=1e9)return(n/1e9).toFixed(2)+' B';
    if(a>=1e6)return(n/1e6).toFixed(2)+' M';
    return n.toLocaleString();
  } else {
    if(a>=1e9)return(n/1e9).toFixed(2)+'B';
    if(a>=1e6)return(n/1e6).toFixed(2)+'M';
    if(a>=1e3)return(n/1e3).toFixed(1)+'K';
    return Math.round(n).toLocaleString();
  }
}
function fmtFull(n,isVal){
  if(n===null||n===undefined)return'–';
  return Math.round(n).toLocaleString()+(isVal?' ₭':'');
}
function diffBadge(a,b){
  if(!b||b===0)return'';
  const g=(a-b)/Math.abs(b)*100;
  if(isNaN(g))return'';
  const cls=g>0?'dup':g<0?'ddn':'dneu',arrow=g>0?'▲':g<0?'▼':'–';
  return`<span class="dbadge ${cls}">${arrow} ${Math.abs(g).toFixed(1)}%</span>`;
}

function animEl(el,target,isVal){
  const steps=20,dur=480;let step=0;
  const iv=setInterval(()=>{
    step++;const ease=1-Math.pow(1-step/steps,3);
    el.textContent=fmt(target*ease,isVal);
    if(step>=steps){el.textContent=fmt(target,isVal);clearInterval(iv);}
  },dur/steps);
}

/* ── Setters ── */
function setTab(t){
  tab=t;
  document.getElementById('tab-domestic').className='btn'+(t==='domestic'?' active-blue':'');
  document.getElementById('tab-crossborder').className='btn'+(t==='crossborder'?' active-blue':'');
  document.getElementById('cb-extra').style.display=t==='crossborder'?'block':'none';
  render();
}
function setMetric(m){
  metric=m;
  document.getElementById('metric-vol').className='btn'+(m==='vol'?' active-purple':'');
  document.getElementById('metric-value').className='btn'+(m==='value'?' active-purple':'');
  render();
}
function setMode(m){
  mode=m;
  document.getElementById('mode-single').className='btn'+(m==='single'?' active-amber':'');
  document.getElementById('mode-compare').className='btn'+(m==='compare'?' active-amber':'');
  if(m==='single'){selB=null;}
  else{if(selB===null)selB=(selA+1)%12;}
  updatePills();render();
}
function setCorridor(c){
  corridor=c;
  document.querySelectorAll('.cpill').forEach(b=>b.classList.remove('active'));
  document.getElementById(c==='all'?'cp-all':'cp-'+c).classList.add('active');
  buildIOMoMCards();buildIOChart();
}

/* ── Month pills ── */
function buildPills(){
  const mf=document.getElementById('month-filter');
  mf.innerHTML='';
  const all=document.createElement('button');
  all.className='mpill';all.id='m-all';all.textContent='All Year';
  all.onclick=()=>clickMonth('all');mf.appendChild(all);
  D.months.forEach((mn,i)=>{
    const b=document.createElement('button');
    b.className='mpill';b.id='m-'+i;b.textContent=mn;
    b.onclick=()=>clickMonth(i);mf.appendChild(b);
  });
}
function clickMonth(i){
  if(mode==='single'){selA=i;selB=null;}
  else{
    if(i==='all'){selA='all';selB=null;setMode('single');return;}
    if(selA===null){selA=i;}
    else if(selB===null&&i!==selA){selB=i;}
    else{selA=i;selB=null;}
  }
  updatePills();render();
}
function updatePills(){
  document.querySelectorAll('.mpill').forEach(p=>p.className='mpill');
  if(mode==='single'){
    const el=document.getElementById(selA==='all'?'m-all':'m-'+selA);
    if(el)el.classList.add('sel-a');
  } else {
    if(selA!==null&&selA!=='all'){const ea=document.getElementById('m-'+selA);if(ea)ea.classList.add('sel-a');}
    if(selB!==null){const eb=document.getElementById('m-'+selB);if(eb)eb.classList.add('sel-b');}
  }
  const hint=document.getElementById('hint-text');
  if(mode==='compare'){
    if(selA!==null&&selB!==null)
      hint.innerHTML=`Comparing <span style="color:#60a5fa">${D.months[selA]}</span> vs <span style="color:#fbbf24">${D.months[selB]}</span>`;
    else if(selA!==null)
      hint.innerHTML=`<span style="color:#60a5fa">${D.months[selA]}</span> selected · Pick Month B`;
    else hint.innerHTML='Pick Month A';
  } else {
    hint.innerHTML=selA==='all'?'Showing Full Year 2025':'Showing '+D.months[selA]+' 2025';
  }
}

/* ── KPI ── */
function renderKPI(){
  const grid=document.getElementById('kgrid');
  const isVal=metric==='value',key=metric;
  const cmp=mode==='compare'&&selA!==null&&selB!==null;
  function card(name,iconHtml,arr,color,isTotal){
    const vA=getVal(arr,selA);
    const vB=cmp?getVal(arr,selB):null;
    let inner='';
    if(cmp){
      inner=`<div class="cmp-row">
        <div class="cmp-blk"><div class="cmp-m ca">${D.months[selA]}</div>
          <div class="cmp-v ca" data-target="${vA}" data-isval="${isVal}">${fmt(vA,isVal)}</div></div>
        <div class="cmp-blk"><div class="cmp-m cb">${D.months[selB]}</div>
          <div class="cmp-v cb" data-target="${vB}" data-isval="${isVal}">${fmt(vB,isVal)}</div></div>
      </div>${diffBadge(vB,vA)}`;
    } else {
      inner=`<div class="kval" style="${color?'color:'+color:''}" data-target="${vA}" data-isval="${isVal}">${fmt(vA,isVal)}</div>`;
    }
    return`<div class="kcard${isTotal?' tot':''}">
      ${iconHtml}<div class="kname">${name}</div>${inner}</div>`;
  }
  let html='';
  if(tab==='domestic'){
    html+=card('Total E-Payment Domestic','<div class="kicon">🏦</div>',D.domestic.total[key],null,true);
    D.domestic.categories.forEach(c=>html+=card(c.name,`<div class="kicon">${c.icon}</div>`,c[key],c.color,false));
  } else {
    html+=card('Total Cross-Border (LAPNet)','<div class="kicon">✈️</div>',D.cross_border.total[key],null,true);
    D.cross_border.corridors.forEach(c=>html+=card(c.name,`<div class="kflags">${c.flags}</div>`,c[key],c.color,false));
  }
  grid.innerHTML=html;
  grid.querySelectorAll('[data-target]').forEach(el=>{
    const t=parseFloat(el.dataset.target)||0;
    animEl(el,t,el.dataset.isval==='true');
  });
}

/* ── IO summary grid ── */
function renderIOGrid(){
  const isVal=metric==='value',key=metric;
  const cmp=mode==='compare'&&selA!==null&&selB!==null;
  let html='';
  D.cross_border.corridors.forEach(c=>{
    const v=getVal(c[key],selA),inV=getVal(c['in_'+key],selA),outV=getVal(c['out_'+key],selA);
    const vB=cmp?getVal(c[key],selB):null,inB=cmp?getVal(c['in_'+key],selB):null,outB=cmp?getVal(c['out_'+key],selB):null;
    html+=`<div class="iocard">
      <div class="iohdr"><span class="ioflags">${c.flags}</span><span class="ioname">${c.name}</span>
        <span style="width:7px;height:7px;border-radius:50%;background:${c.color};display:inline-block;margin-left:auto"></span></div>
      <div class="iorow"><span class="iolabel">Total</span>
        <span class="ionum cblue">${fmt(v,isVal)}${cmp?` → <span class="camber">${fmt(vB,isVal)}</span>`:''}</span></div>
      <div class="iorow"><span class="iolabel">▼ Inbound</span>
        <span class="ionum cgreen">${fmt(inV,isVal)}${cmp?` → <span class="camber">${fmt(inB,isVal)}</span>`:''}</span></div>
      <div class="iorow"><span class="iolabel">▲ Outbound</span>
        <span class="ionum camber">${fmt(outV,isVal)}${cmp?` → <span class="camber">${fmt(outB,isVal)}</span>`:''}</span></div>
    </div>`;
  });
  document.getElementById('io-grid').innerHTML=html;

  let html2='';
  D.cross_border.direct.forEach(d=>{
    const v=getVal(d[key],selA),vB=cmp?getVal(d[key],selB):null;
    html2+=`<div class="dcard">
      <div class="dbrand" style="color:${d.color}">${d.name}</div>
      <div class="dval">${fmt(v,isVal)}</div>
      ${cmp?`<div class="dsub camber">${D.months[selB]}: ${fmt(vB,isVal)}</div>`:
        `<div class="dsub">${isVal?'₭ LAK':'Transactions'}</div>`}
    </div>`;
  });
  document.getElementById('direct-grid').innerHTML=html2;
}

/* ── IO MoM mini cards ── */
function buildIOMoMCards(){
  const isVal=metric==='value',key=metric;
  let inArr,outArr;
  if(corridor==='all'){
    inArr=D.months.map((_,i)=>D.cross_border.corridors.reduce((s,c)=>s+(c['in_'+key][i]||0),0));
    outArr=D.months.map((_,i)=>D.cross_border.corridors.reduce((s,c)=>s+(c['out_'+key][i]||0),0));
  } else {
    const c=D.cross_border.corridors[corridor];
    inArr=c['in_'+key].map(v=>v||0);
    outArr=c['out_'+key].map(v=>v||0);
  }
  let html='';
  D.months.forEach((mn,i)=>{
    const inV=inArr[i],outV=outArr[i],net=inV-outV;
    const netCls=net>=0?'net-pos':'net-neg';
    const netSign=net>=0?'+':'';
    html+=`<div class="iomcard">
      <div class="iomm">${mn}</div>
      <div class="iom-in">▼ ${fmt(inV,isVal)}</div>
      <div class="iom-out">▲ ${fmt(outV,isVal)}</div>
      <div class="iom-net ${netCls}">Net: ${netSign}${fmt(net,isVal)}</div>
    </div>`;
  });
  document.getElementById('io-mom-cards').innerHTML=html;
}

/* ── IO MoM Big chart ── */
function buildIOChart(){
  const ctx=document.getElementById('ioChart').getContext('2d');
  if(ioChart){ioChart.destroy();ioChart=null;}
  const isVal=metric==='value',key=metric;
  let inArr,outArr,title;
  if(corridor==='all'){
    inArr=D.months.map((_,i)=>D.cross_border.corridors.reduce((s,c)=>s+(c['in_'+key][i]||0),0));
    outArr=D.months.map((_,i)=>D.cross_border.corridors.reduce((s,c)=>s+(c['out_'+key][i]||0),0));
    title='All Corridors Combined';
  } else {
    const c=D.cross_border.corridors[corridor];
    inArr=c['in_'+key].map(v=>v||0);
    outArr=c['out_'+key].map(v=>v||0);
    title=c.name;
  }
  const netArr=inArr.map((v,i)=>v-(outArr[i]||0));

  // MoM growth for inbound
  const inGrowth=inArr.map((v,i)=>{
    if(i===0)return null;
    const prev=inArr[i-1];
    if(!prev)return null;
    return ((v-prev)/Math.abs(prev)*100);
  });

  ioChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:D.months,
      datasets:[
        {label:'▼ Inbound',data:inArr,backgroundColor:'#10b981bb',borderColor:'#10b981',
         borderWidth:1,borderRadius:5,order:2},
        {label:'▲ Outbound',data:outArr,backgroundColor:'#f59e0bbb',borderColor:'#f59e0b',
         borderWidth:1,borderRadius:5,order:2},
        {label:'Net Balance',data:netArr,type:'line',borderColor:'#a78bfa',backgroundColor:'transparent',
         borderWidth:2.5,pointRadius:5,pointHoverRadius:8,pointBackgroundColor:'#a78bfa',
         tension:0.35,order:1,yAxisID:'y'},
        {label:'Inbound MoM %',data:inGrowth,type:'line',borderColor:'#f472b6',backgroundColor:'transparent',
         borderWidth:1.5,borderDash:[4,3],pointRadius:3,pointHoverRadius:6,
         pointBackgroundColor:'#f472b6',tension:0.3,order:1,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        title:{display:true,text:title+' — Inbound vs Outbound MoM',
               color:'#94a3b8',font:{size:12,weight:'bold'},padding:{bottom:10}},
        legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:10,usePointStyle:true}},
        tooltip:{backgroundColor:'#1e2535',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
          titleColor:'#e2e8f0',bodyColor:'#94a3b8',padding:11,
          callbacks:{label:ctx=>{
            if(ctx.dataset.label==='Inbound MoM %')
              return'  '+ctx.dataset.label+': '+(ctx.raw!==null?ctx.raw.toFixed(1)+'%':'–');
            return'  '+ctx.dataset.label+': '+fmtFull(ctx.raw,isVal);
          }}}
      },
      scales:{
        x:{ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,.03)'}},
        y:{ticks:{color:'#64748b',callback:v=>fmt(v,isVal)},grid:{color:'rgba(255,255,255,.05)'},
           title:{display:true,text:isVal?'Value (LAK)':'Transactions',color:'#475569',font:{size:10}}},
        y2:{position:'right',ticks:{color:'#f472b6',callback:v=>v!==null?v.toFixed(1)+'%':''},
            grid:{display:false},
            title:{display:true,text:'MoM Growth %',color:'#f472b6',font:{size:10}}}
      }
    }
  });
}

/* ── Main charts ── */
function buildMainChart(){
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(mainChart){mainChart.destroy();mainChart=null;}
  const key=metric,isVal=metric==='value';
  const cmp=mode==='compare'&&selA!==null&&selB!==null;
  const cats=tab==='domestic'?D.domestic.categories:D.cross_border.corridors;
  let datasets=[];

  if(cmp){
    cats.forEach(cat=>{
      datasets.push({label:cat.name+' ('+D.months[selA]+')',
        data:cat[key].map((v,i)=>i===selA?(v||0):null),
        backgroundColor:cat.color+'cc',borderColor:cat.color,borderWidth:1,borderRadius:5});
      datasets.push({label:cat.name+' ('+D.months[selB]+')',
        data:cat[key].map((v,i)=>i===selB?(v||0):null),
        backgroundColor:cat.color+'44',borderColor:cat.color+'88',borderWidth:1,borderRadius:5});
    });
    document.getElementById('main-chart-title').textContent=D.months[selA]+' vs '+D.months[selB];
  } else {
    const s=selA;
    cats.forEach(cat=>{
      datasets.push({label:cat.name,data:cat[key].map(v=>v||0),
        backgroundColor:cat[key].map((_,i)=>s==='all'?cat.color+'bb':i===s?cat.color+'ee':cat.color+'22'),
        borderColor:cat.color,borderWidth:1,borderRadius:4});
    });
    document.getElementById('main-chart-title').textContent=
      tab==='domestic'?'Monthly Domestic Trend':'Monthly Cross-Border Trend';
  }

  mainChart=new Chart(ctx,{type:'bar',data:{labels:D.months,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:9,usePointStyle:true}},
      tooltip:{backgroundColor:'#1e2535',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
        titleColor:'#e2e8f0',bodyColor:'#94a3b8',padding:11,
        callbacks:{label:ctx=>'  '+ctx.dataset.label+': '+fmtFull(ctx.raw,isVal)}}
    },
    scales:{
      x:{ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,.03)'}},
      y:{ticks:{color:'#64748b',callback:v=>fmt(v,isVal)},grid:{color:'rgba(255,255,255,.05)'}}
    }
  }});
}

function buildDonutChart(){
  const ctx=document.getElementById('donutChart').getContext('2d');
  if(donutChart){donutChart.destroy();donutChart=null;}
  const key=metric,isVal=metric==='value';
  const cmp=mode==='compare'&&selA!==null&&selB!==null;
  const cats=tab==='domestic'?D.domestic.categories:D.cross_border.corridors;
  const labels=[],dataA=[],dataB=[],colors=[];
  cats.forEach(c=>{labels.push(c.name);dataA.push(getVal(c[key],selA)||0);
    if(cmp)dataB.push(getVal(c[key],selB)||0);colors.push(c.color);});

  const ds=cmp?[
    {label:D.months[selA],data:dataA,backgroundColor:colors.map(c=>c+'cc'),borderColor:colors,borderWidth:2,hoverOffset:10},
    {label:D.months[selB],data:dataB,backgroundColor:colors.map(c=>c+'44'),borderColor:colors.map(c=>c+'88'),borderWidth:1,hoverOffset:10},
  ]:[{data:dataA,backgroundColor:colors.map(c=>c+'cc'),borderColor:colors,borderWidth:2,hoverOffset:12}];

  document.getElementById('donut-title').textContent=cmp?
    D.months[selA]+' vs '+D.months[selB]:'Breakdown · '+(selA==='all'?'Full Year':D.months[selA]);

  donutChart=new Chart(ctx,{type:'doughnut',data:{labels,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,cutout:cmp?'55%':'65%',
    plugins:{
      legend:{position:'right',labels:{color:'#94a3b8',font:{size:10},padding:8,boxWidth:9,usePointStyle:true}},
      tooltip:{backgroundColor:'#1e2535',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
        titleColor:'#e2e8f0',bodyColor:'#94a3b8',padding:10,
        callbacks:{label:ctx=>{
          const total=ctx.dataset.data.reduce((a,b)=>a+(b||0),0);
          const p=total>0?(ctx.raw/total*100).toFixed(1):0;
          return'  '+ctx.label+': '+fmt(ctx.raw,isVal)+' ('+p+'%)';
        }}}
    }
  }});
}

/* ── Master render ── */
function render(){
  renderKPI();
  buildMainChart();
  buildDonutChart();
  if(tab==='crossborder'){
    renderIOGrid();
    buildIOMoMCards();
    buildIOChart();
  }
}

buildPills();updatePills();render();
</script>
</body></html>
